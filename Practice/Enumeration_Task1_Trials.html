<!DOCTYPE html>
<html>
  <head>
    <title>Enumeration Task Part 1</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
      body {
        margin: 0;
        background-color: #808080;
      }
      .jspsych-content {
        background: #808080;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .jspsych-btn {
        display: none !important;
      }
      .jspsych-survey-text-question {
        margin: 0;
      }
      .response-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .response-screen input {
        margin-top: 20px;
        font-size: 28px;
        width: 200px;
        text-align: center;
      }
    </style>
  </head>
  <body></body>
  <script>

    // initialise jspsych
    const jsPsych = initJsPsych({
        on_finish: function() {
        // 1. Target the main experimnent trials
        var allPart1Trials = jsPsych.data.get().filter({test_part: 'part1_trial'}).values();
        
        // 2.  Filter specifically for data collection nodes that contain responses
        var finalPassingTrials = allPart1Trials.filter(function(trial) {
            return trial.participant_response !== undefined;
        });

        // 3. Extract your targeted metrics from all 48 trials
        var countsArray = [];
        var responsesArray = [];
        var rtsArray = [];
        var scoresArray = [];

        finalPassingTrials.forEach(function(trial) {
            countsArray.push(trial.squares_count);
            responsesArray.push(trial.participant_response);
            rtsArray.push(Math.round(trial.rt)); // Rounded for clean string data
            scoresArray.push(trial.correct ? 1 : 0); // Convert true/false to 1 or 0
        });

        // 4. Package the array sets into clean comma-separated strings
        var messagePayload = {
            source: 'jspsych-experiment',
            counts: countsArray.join(','),
            responses: responsesArray.join(','),
            rts: rtsArray.join(','),
            scores: scoresArray.join(',')
        };

        // 5. Broadcast the clean strings to the Qualtrics parent listener window
        window.parent.postMessage(messagePayload, "*"); 
    }
});
     
    var timeline = [];

    // preload images for the mask
    const preload = {
      type: jsPsychPreload,
      images: ['mask_2.png']
    };

    // instructions for the experiment
    const welcome_instructions = {
      type: jsPsychHtmlKeyboardResponse,
        stimulus: `
            <div style="font-size: 14px; color: #000000; max-width: 800px; margin: 0 auto; line-height: 1.5; font-family: sans-serif; text-align: left;">
      
              <h2 style="text-align: center; margin-bottom: 30px; font-size: 18px; color: #111111;">Welcome to Part 1 of the Main Experiment</h2>
      
              <p style="margin-bottom: 24px;">
                As in the Practice Round, in this task, a <strong>collection of squares</strong> will flash very quickly on the screen. 
                Because they flash so fast, you will not be able to count them individually. Instead, you must estimate how many squares you saw.
              </p>
      
              <h3 style="font-size: 16px; margin-bottom: 15px; color: #111111;">Step-by-Step Instructions:</h3>
      
              <ul style="padding-left: 18px; margin-bottom: 24px;">
                <li style="margin-bottom: 12px;">
                  <strong>Focus:</strong> Each trial begins with a fixation cross <strong>(+)</strong>. Please keep your eyes fixed on this cross.
                </li>
                <li style="margin-bottom: 12px;">
                  <strong>Observe:</strong> A group of small squares will flash on the screen for a fraction of a second.
                </li>
                <li style="margin-bottom: 12px;">
                  <strong>Observe:</strong> Next, a mask of 100 overlapping black and white squares will appear for a fraction of a second.
                </li>
                <li style="margin-bottom: 12px;">
                  <strong>Respond:</strong> When the <strong>?</strong> appears, type the number of squares you saw using the <strong>number keys</strong> on your keyboard.
                </li>
              </ul>
      
              <p style="margin-bottom: 24px; background-color: #f9f9f9; padding: 15px; border-left: 4px solid #333;">
                <strong>Important:</strong> Try to respond as <strong>quickly and accurately</strong> as possible. 
                You have a limited time to answer. If you do not respond within 2.4 seconds, the trial will automatically time out and advance.
              </p>
      
              <p style="margin-bottom: 30px; text-align: center;">
                You will complete the <strong>Main Experiment</strong> in two parts.
              </p>
      
              <p style="text-align: center; font-size: 18px; color: #000000;">
                <strong>Press the spacebar to begin Part 1.</strong>
              </p>
      
            </div>
          `,
          choices: [' '] 
    };

    timeline.push(preload, welcome_instructions);

// 1. GENERATE THE TRIAL STRUCTURE MATRIX (48 TRIALS)
    // Create an array containing six entries for each set size from 1 to 8
    var trial_counts_pool = [];
    for (let count = 1; count <= 8; count++) {
      for (let rep = 0; rep < 6; rep++) {
        trial_counts_pool.push(count);
      }
    }

    // Fully randomize the presentation order of the 48 trials
    var randomized_counts = jsPsych.randomization.shuffle(trial_counts_pool);

    // 2. BUILD THE EXPERIMENT TIMELINE
    // Loop through our 48 randomized counts to construct unique timeline blocks
    for (let i = 0; i < randomized_counts.length; i++) {
      let currentCount = randomized_counts[i];
      let isLastTrial = (i === randomized_counts.length - 1);

      // Fixation cross trial
      var fixation_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="font-size: 72px; color: #000000; display: flex; align-items: center; justify-content: center; height: 100vh;">+</div>',
        choices: 'NO_KEYS',
        trial_duration: 1000
      };

      // Squares trial (Generates unique coordinates completely randomly for every trial)
      var squares_trial = {
        type: jsPsychCanvasKeyboardResponse,
        data: {
          test_part: 'main_experiment_part1',
          squares_count: currentCount
        },
        stimulus: function(c) {
          var ctx = c.getContext('2d');
          ctx.clearRect(0, 0, c.width, c.height);
          ctx.fillStyle = "black";
      
          var targetArea = 200;
          var startX = (c.width - targetArea) / 2;
          var startY = (c.height - targetArea) / 2;
      
          var trial_count = jsPsych.getCurrentTrial().data.squares_count;

          // Pure JavaScript random functions ensure position novelty across all 48 trials
          function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
          }

          function checkOverlap(newSquare, existingSquares) {
            return existingSquares.some(function(sq) {
              return !(newSquare.x + newSquare.size < sq.x ||
                       newSquare.x > sq.x + sq.size ||
                       newSquare.y + newSquare.size < sq.y ||
                       newSquare.y > sq.y + sq.size);
            });
          }

          var squares = [];
          var maxAttempts = 1000;
          var attempts = 0;
          var edgeMargin = 20; 

          while (squares.length < trial_count && attempts < maxAttempts) {
            var size = getRandomInt(12, 16);
            var x = getRandomInt(startX + edgeMargin, startX + targetArea - edgeMargin - size);
            var y = getRandomInt(startY + edgeMargin, startY + targetArea - edgeMargin - size);
        
            var proposedSquare = { x: x, y: y, size: size };
        
            if (!checkOverlap(proposedSquare, squares)) {
              squares.push(proposedSquare);
            }
            attempts++;
          }

          squares.forEach(function(sq) {
            ctx.fillRect(sq.x, sq.y, sq.size, sq.size);
          });
        },
        choices: "NO_KEYS",
        trial_duration: 100,
        canvas_size: [300, 300] 
      };

      // Mask trial
      var mask_trial = {
        type: jsPsychImageKeyboardResponse,
        stimulus: 'mask_2.png',
        choices: 'NO_KEYS',
        trial_duration: 400
      };

      // Input collection trial
      var question_response_trial = {
        type: jsPsychHtmlButtonResponse,
        stimulus: function() {
          let correctValue = String(currentCount);

          return `
            <div style="font-size: 72px; color: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
              <div>?</div>
            
              <input type="text" id="auto-input" autofocus autocomplete="off"
                     data-correct="${correctValue}"
                     style="width: 50px; font-size: 24px; text-align: center; padding: 5px; border: 2px solid #333; border-radius: 4px; margin-top: 60px;"
                     oninput="
                       let rt = performance.now() - window.trialStartTime;
                       let val = this.value.trim();
                 
                       if (val.length === 1 && '12345678'.includes(val)) {
                         this.disabled = true; 
                         let currentTrial = jsPsych.getCurrentTrial();
                         currentTrial.data.participant_response = val;
                         currentTrial.data.rt = rt;
                         currentTrial.data.correct = (val === this.getAttribute('data-correct'));
                         jsPsych.finishTrial();
                       }
                     "
              >
            </div>
          `;
        },
        choices: [], 
        trial_duration: 2400, 
        data: {
          test_part: 'main_experiment_part1',
          squares_count: currentCount,
          participant_response: null, 
          rt: null,                   
          correct: false              
        },
        on_load: function() {
          window.trialStartTime = performance.now();
          setTimeout(function() {
            var element = document.getElementById('auto-input');
            if (element) element.focus();
          }, 10);
        },
        on_finish: function(data) {
          data.test_part = 'main_experiment_part1';
          data.squares_count = currentCount;
          
          if (data.participant_response === null) {
            data.participant_response = "timeout";
            data.rt = 2400;
            data.correct = false;
          } else {
            data.correct = (data.participant_response === String(currentCount));
          }

          // IF THIS IS THE 48TH TRIAL, PACKAGE ALL DATA AND POST MESSAGE TO QUALTRICS
          if (isLastTrial) {
            console.log("Final trial reached. Compiling part 1 payload for Qualtrics...");
            
            var all_responses = jsPsych.data.get().filter({test_part: 'main_experiment_part1'}).values();
            
            var countsArray = [];
            var responsesArray = [];
            var rtsArray = [];
            var scoresArray = [];

            all_responses.forEach(function(trial) {
              // Ensure we only record metrics from data collection objects containing responses
              if (trial.participant_response !== undefined) {
                countsArray.push(trial.squares_count);
                responsesArray.push(trial.participant_response);
                rtsArray.push(Math.round(trial.rt));
                scoresArray.push(trial.correct ? 1 : 0);
              }
            });

            var messagePayload = {
                source: 'jspsych-experiment',
                counts: countsArray.join(','),
                responses: responsesArray.join(','),
                rts: rtsArray.join(','),
                scores: scoresArray.join(',')
            };

            // Post structural CSV-friendly data payload to Qualtrics window parent
            window.parent.postMessage(messagePayload, "*"); 
          }
        }
      };

      // Clearance delay to prevent key register carryover
      var input_clearance_trial = {
        type: jsPsychHtmlKeyboardResponse, stimulus: '', choices: "NO_KEYS", trial_duration: 150
      };

      // Spacebar step progression screen
      var spacebar_prompt_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="font-size: 24px; color: #000000; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh;">Press the spacebar to begin the next trial</div>',
        choices: [' ']
      };

      // Short break buffering next item loop
      var inter_round_pause_trial = {
        type: jsPsychHtmlKeyboardResponse, stimulus: '', choices: "NO_KEYS", trial_duration: 200
      };

      // Push individual components iteratively to the baseline script pipeline
      timeline.push(
        fixation_trial, 
        squares_trial, 
        mask_trial, 
        question_response_trial,
        input_clearance_trial,
        spacebar_prompt_trial,
        inter_round_pause_trial
      );
    }

    // 3. FINAL COMPLETION SCREEN
    var part1_complete_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="font-size: 18px; color: #000000; max-width: 800px; margin: 0 auto; line-height: 1.6; font-family: sans-serif; text-align: center; height: 60vh; display: flex; flex-direction: column; justify-content: center;">
          <h2 style="margin-bottom: 25px; font-size: 26px; color: #111111;">Congratulations you have now completed Part 1 of the Experiment</h2>
          <p style="margin-bottom: 35px;">
            You have now completed all 48 trials for Part 1 of this section.
          </p>
          <p style="font-size: 22px; color: #000000; margin-bottom: 10px;">
            <strong>Click the "Next" button below to continue to the next part of the study.</strong>
          </p>
        </div>`,
      choices: "NO_KEYS",
      on_load: function() {
          // Freezes jsPsych engine right here so data safely remains in memory/Qualtrics catches it
          jsPsych.pauseTimeline();
        }
    };  
     
    timeline.push(part1_complete_screen);

  // Run the experiment  
  jsPsych.run(timeline);

  </script>
</html>
