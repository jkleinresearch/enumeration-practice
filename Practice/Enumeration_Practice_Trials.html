<!DOCTYPE html>
<html>
  <head>
    <title>Enumeration Practice</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-image-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.2.0"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
      body {
        margin: 0;
        background-color: #808080;
      }
      .jspsych-content {
        background: #808080;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .jspsych-btn {
        display: none !important;
      }
      .jspsych-survey-text-question {
        margin: 0;
      }
      .response-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .response-screen input {
        margin-top: 20px;
        font-size: 28px;
        width: 200px;
        text-align: center;
      }
    </style>
  </head>
  <body></body>
  <script>

    // initialise jspsych
    const jsPsych = initJsPsych({
        on_finish: function() {
        // 1. Filter out only the trials marked as practice trials
        var allPracticeTrials = jsPsych.data.get().filter({test_part: 'practice_trial'}).values();
        
        // 2. Grab only the last 6 trials (the ones from their successful final loop pass)
        var finalPassingTrials = allPracticeTrials.slice(-6);

        // 3. Extract your targeted metrics from just those 6 passing trials
        var countsArray = [];
        var responsesArray = [];
        var rtsArray = [];
        var scoresArray = [];

        finalPassingTrials.forEach(function(trial) {
            countsArray.push(trial.squares_count);
            responsesArray.push(trial.participant_response);
            rtsArray.push(Math.round(trial.rt)); // Rounded for clean string data
            scoresArray.push(trial.correct ? 1 : 0); // Convert true/false to 1 or 0
        });

        // 4. Package the array sets into clean comma-separated strings
        var messagePayload = {
            source: 'jspsych-experiment',
            counts: countsArray.join(','),
            responses: responsesArray.join(','),
            rts: rtsArray.join(','),
            scores: scoresArray.join(','),
            attempts: practiceAttempts
        };

        // 5. Broadcast the clean strings to the Qualtrics parent listener window
        window.parent.postMessage(messagePayload, "*"); 
    }
});
     
    var timeline = [];

    // preload images for the mask
    const preload = {
      type: jsPsychPreload,
      images: ['mask_2.png']
    };

    // instructions for the experiment
    const welcome_instructions = {
      type: jsPsychHtmlKeyboardResponse,
        stimulus: `
            <div style="font-size: 14px; color: #000000; max-width: 800px; margin: 0 auto; line-height: 1.5; font-family: sans-serif; text-align: left;">
      
              <h2 style="text-align: center; margin-bottom: 24px; font-size: 20px; color: #111111;">Welcome to the Practice Round</h2>
        
              <p style="text-align: center; margin-bottom: 18px; font-size: 16px; padding: 15px;">
                Your task is to <strong>type the number of squares you see</strong> using your keyboard as quickly and accurately as possible. If you do not respond within 2.4 seconds, the trial will automatically time out and advance. 
              </p>
                      
              <p style="text-align: center; font-size: 18px; color: #000000;">
                <strong>Press the <u>spacebar</u> to begin</strong>
              </p>
      
            </div>
          `,
          choices: [' '] 
    };

    timeline.push(preload, welcome_instructions);

// Squares trial empty array to pool all possible 8 rounds
    var all_rounds = [];

    // Loop to build the 8 independent round objects
    for (let currentCount = 1; currentCount <= 8; currentCount++) {

      // fixation cross trial
      var fixation_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="font-size: 72px; color: #000000; display: flex; align-items: center; justify-content: center; height: 100vh;">+</div>',
        choices: 'NO_KEYS',
        trial_duration: 1000
      };

      // Squares trial (Baked-in unique count)
      var squares_trial = {
        type: jsPsychCanvasKeyboardResponse,
        data: {
          squares_count: currentCount // This locks the current count integer into this specific trial object's data
        },
        stimulus: function(c) {
          var ctx = c.getContext('2d');
          ctx.clearRect(0, 0, c.width, c.height);
          ctx.fillStyle = "black";
      
          var targetArea = 200;
          var startX = (c.width - targetArea) / 2;
          var startY = (c.height - targetArea) / 2;
      
          // FIX: Pull directly from the trial's local data block to prevent closure/scoping duplication errors
          var trial_count = jsPsych.getCurrentTrial().data.squares_count;
          var t = (trial_count * 1000) + 0x6D2B79F5;
      
          function seededRandom() {
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          }

          function getSeededInt(min, max) {
            return Math.floor(seededRandom() * (max - min + 1)) + min;
          }

          function checkOverlap(newSquare, existingSquares) {
             // Adjust this number (in pixels) to set the minimum distance between squares
            var buffer = 30; 

            return existingSquares.some(function(sq) {
              return !(newSquare.x + newSquare.size + buffer < sq.x ||
                       newSquare.x > sq.x + sq.size + buffer ||
                       newSquare.y + newSquare.size + buffer < sq.y ||
                       newSquare.y > sq.y + sq.size + buffer);
            });
          }

          var squares = [];
          var maxAttempts = 1000;
          var attempts = 0;
          var edgeMargin = 20; 

          while (squares.length < trial_count && attempts < maxAttempts) {
            var size = getSeededInt(12, 16);
            var x = getSeededInt(startX + edgeMargin, startX + targetArea - edgeMargin - size);
            var y = getSeededInt(startY + edgeMargin, startY + targetArea - edgeMargin - size);
        
            var proposedSquare = { x: x, y: y, size: size };
        
            if (!checkOverlap(proposedSquare, squares)) {
              squares.push(proposedSquare);
            }
            attempts++;
          }

          squares.forEach(function(sq) {
            ctx.fillRect(sq.x, sq.y, sq.size, sq.size);
          });
        },
        choices: "NO_KEYS",
        trial_duration: 100,
        canvas_size: [300, 300] 
      };

      // mask trial
      var mask_trial = {
        type: jsPsychImageKeyboardResponse,
        stimulus: 'mask_2.png',
        choices: 'NO_KEYS',
        trial_duration: 400
      };

      // Define the question response template
      var question_response_trial = {
        type: jsPsychHtmlButtonResponse,
        stimulus: function() {
          // FIX: Pass the precise static value straight to the input template string
          let correctValue = String(currentCount);

          return `
            <div style="font-size: 72px; color: #000000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
              <div>?</div>
            
              <input type="text" id="auto-input" autofocus autocomplete="off"
                     data-correct="${correctValue}"
                     style="width: 50px; font-size: 24px; text-align: center; padding: 5px; border: 2px solid #333; border-radius: 4px; margin-top: 60px;"
                     oninput="
                       let rt = performance.now() - window.trialStartTime;
                       let val = this.value.trim();
                 
                       if (val.length === 1 && '12345678'.includes(val)) {
                         this.disabled = true; 
                         let currentTrial = jsPsych.getCurrentTrial();
                         currentTrial.data.participant_response = val;
                         currentTrial.data.rt = rt;

                         // FIX: Evaluate using the attribute generated safely in the DOM layer
                         currentTrial.data.correct = (val === this.getAttribute('data-correct'));
                         
                         currentTrial.data.test_part = 'practice_trial'; 
                         jsPsych.finishTrial();
                       }
                     "
              >
            </div>
          `;
        },
        choices: [], 
        trial_duration: 2400, 
        data: {
          test_part: 'practice_trial',
          squares_count: currentCount, // FIX: Avoid timeline variable errors
          participant_response: null, 
          rt: null,                   
          correct: false              
        },
        on_load: function() {
          window.trialStartTime = performance.now();
          setTimeout(function() {
            var element = document.getElementById('auto-input');
            if (element) element.focus();
          }, 10);
        },
        on_finish: function(data) {
          data.test_part = 'practice_trial';
          // FIX: Safeguard data check on completion
          data.squares_count = currentCount;
          
          if (data.participant_response === null) {
            data.participant_response = "timeout";
            data.rt = 2400;
            data.correct = false;
          } else {
            data.correct = (data.participant_response === String(currentCount));
          }
        }
      };

      // Invisible trial to prevent auto advance without pressing spacebar
      var input_clearance_trial = {
        type: jsPsychHtmlKeyboardResponse, stimulus: '', choices: "NO_KEYS", trial_duration: 150
      };

      // Define the spacebar prompt to begin next trial
      var spacebar_prompt_trial = {
        type: jsPsychHtmlKeyboardResponse,
        stimulus: '<div style="font-size: 20px; color: #000000; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh;"><strong>Press the <u>spacebar</u> to begin the next trial</strong></div>',
        choices: [' ']
      };

      // Define 200ms inter-trial pause
      var inter_round_pause_trial = {
        type: jsPsychHtmlKeyboardResponse, stimulus: '', choices: "NO_KEYS", trial_duration: 200
      };

      // Group the sequence components together as one locked round object
      var single_round_procedure = {
        timeline: [
          fixation_trial, 
          squares_trial, 
          mask_trial, 
          question_response_trial,
          input_clearance_trial,
          spacebar_prompt_trial,
          inter_round_pause_trial
        ]
      };

      // Push the independent round block into the pool array
      all_rounds.push(single_round_procedure);
    }

    // ================================================================
    // PIPELINE CONTROL BLOCK
    // ================================================================

    // Randomly pick EXACTLY 6 unique rounds out of the 8 available
    var randomized_rounds = jsPsych.randomization.sampleWithoutReplacement(all_rounds, 6);

    // ATTEMPT COUNTER: Tracks practice run loops
    var practiceAttempts = 1; 

    // NEW SKIP SCREEN: Shows if they fail the practice 6 times sequentially
    var skip_experiment_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="font-size: 18px; color: #000000; max-width: 800px; margin: 0 auto; line-height: 1.5; font-family: sans-serif; text-align: center; height: 60vh; display: flex; flex-direction: column; justify-content: center;">
          <h2 style="margin-bottom: 24px; font-size: 18px; color: #000000;">Practice Round Complete</h2>
          <p style="margin-bottom: 18px; font-size: 16px;">
            You have reached the maximum number of attempts for the practice round. Rather than keeping you here all day, 
            we'll skip the main perceptual processing task and move you on to the next section of the study. Thanks for sticking with it!
          </p>
          <p style="font-size: 18px; color: #000000; margin-bottom: 6px;">
            <strong>Click the "Next" button below to continue to the next part of the study.</strong>
          </p>
        </div>`,
      choices: "NO_KEYS",
      on_load: function() {
        // Send data directly to Qualtrics right now, attaching the final attempt count
        sendPracticeDataToQualtrics(practiceAttempts);
      }
    };

    // Failure screen (plays only if they get 4+ incorrect)
    var fail_feedback = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `<p style='font-family: sans-serif; font-size: 16px; text-align: center; max-width: 650px; margin-bottom: 12px;'><strong>You got 4 or more incorrect responses. Let's review the instructions and try the practice round again:</strong></p>
    <div style="display: flex; justify-content: center; width: 100%;">
      <div style="text-align: left; max-width: 650px; font-family: sans-serif;">
        <ol style="list-style-type: none; padding-left: 2em; margin-top: 6px">
          <li style="text-indent: -1em; margin-bottom: 6px; font-size: 14px;">
            <strong>1.</strong> Each trial begins with a fixation cross <strong>(+)</strong>. Please keep your eyes fixed on this cross.
          </li>
          <li style="text-indent: -1em; margin-bottom: 6px; font-size: 14px;">
            <strong>2.</strong> A group of <strong>small squares</strong> will flash on the screen for a fraction of a second.
          </li>
          <li style="text-indent: -1em; margin-bottom: 6px; font-size: 14px;">
            <strong>3.</strong> Next, a <strong>mask</strong> of 100 overlapping black and white squares will appear for a fraction of a second.
          </li>
          <li style="text-indent: -1em; margin-bottom: 0px; font-size: 14px;">
            <strong>4.</strong> When the <strong>?</strong> appears, type the number of squares you saw using the <strong>number keys</strong> on your keyboard.
          </li>
        </ol>
      </div>
    </div>
      <div style="display: block; margin: 0 auto; max-width: 600px; padding: 0 10px; font-family: sans-serif; font-size: 14px; text-align: left;">
      <p style="margin-top: 0px; margin-bottom: 6px; background-color: #f9f9f9; padding: 12px; border-left: 3px solid #333; border-right: 3px solid #333; line-height: 1.5;">
        Remember, if you do not respond within 2.4 seconds, the trial will automatically time out and advance.
      </p>
    </div>
    <p style="text-align: center; font-family: sans-serif; font-size: 16px; color: #000000;">
    <strong>Press the <u>spacebar</u> to restart.</strong></p>`,
      choices: [' ']
    };

    // Gatekeeper node: controls whether to repeat or show hard-stop terminal screen
    var fail_feedback_conditional = {
      timeline: [fail_feedback],
      conditional_function: function() {
        var all_practice_responses = jsPsych.data.get().filter({test_part: 'practice_trial'}).values();
        if (all_practice_responses.length < 6) { return false; }
        
        var current_round_responses = all_practice_responses.slice(-6);
        var incorrect_count = current_round_responses.filter(function(trial) {
          return trial.correct === false;
        }).length;
        
        console.log("Gatekeeper evaluation -> Errors in this run:", incorrect_count);
        
        // If they failed but haven't reached 6 attempts, show standard instruction refresh
        if (incorrect_count >= 4 && practiceAttempts < 6) {
          return true;
        }
        
        // Otherwise bypass normal fail screen (either because they passed, or because they are completely locked out)
        return false; 
      }
    };

    // Master Control Loop Wrapper
    var practice_loop_wrapper = {
      timeline: [...randomized_rounds, fail_feedback_conditional],
      loop_function: function(data) {
        var all_practice_responses = jsPsych.data.get().filter({test_part: 'practice_trial'}).values();
        var current_round_responses = all_practice_responses.slice(-6);
      
        var incorrect_count = current_round_responses.filter(function(trial) {
          return trial.correct === false;
        }).length;
      
        var correct_count = current_round_responses.filter(function(trial) {
          return trial.correct === true;
        }).length;
      
        console.log("Loop evaluation -> Attempt:", practiceAttempts, " | Incorrect:", incorrect_count, " | Correct:", correct_count);
      
        // IF FAILED:
        if (incorrect_count >= 4) {
          // Check if this was their 6th and final allowed run
          if (practiceAttempts >= 6) {
            console.log("Max failure limit met. Breaking out of loop.");
            return false; // Break the repeat loop execution line naturally
          }
        
          // Increment tracking index for standard re-runs
          practiceAttempts++;
          
          // Select 6 fresh random unique rounds if they fail, preventing repetition errors
          var fresh_rounds = jsPsych.randomization.sampleWithoutReplacement(all_rounds, 6);
          practice_loop_wrapper.timeline = [...fresh_rounds, fail_feedback_conditional];
          return true;   
        } 
      
        // IF PASSED:
        else if (correct_count >= 3) {
          console.log("Practice passed successfully!");
          return false; // Break loop naturally
        }
      }
    };

    // ================================================================
    // STEP 4 CLOSURE: SCREENS AND DATA DELIVERY
    // ================================================================

    // 1. TERMINAL SKIP SCREEN (If they fail the practice 6 times sequentially)
    var skip_experiment_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="font-size: 18px; color: #000000; max-width: 700px; margin: 0 auto; line-height: 1.5; font-family: sans-serif; text-align: center; height: 60vh; display: flex; flex-direction: column; justify-content: center;">
          <h2 style="margin-bottom: 24px; font-size: 18px; color: #000000;">Practice Round Complete</h2>
          <p style="margin-bottom: 18px; font-size: 16px;">
            You have reached the maximum number of attempts for the practice round. Rather than keeping you here all day, 
            we'll skip the main perceptual processing task and move you on to the next section of the study. Thanks for sticking with it!
          </p>
          <p style="font-size: 18px; color: #000000; margin-bottom: 6px;">
            <strong>Click the "Next" button below to continue to the next part of the study.</strong>
          </p>
        </div>`,
      choices: "NO_KEYS",
      on_load: function() {
        sendPracticeDataToQualtrics(practiceAttempts);
      }
    };

    // RESTORED SUCCESS SCREEN: Keeping your exact wording intact
    var practice_success_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="font-size: 18px; color: #000000; max-width: 800px; margin: 0 auto; line-height: 1.5; font-family: sans-serif; text-align: center; height: 60vh; display: flex; flex-direction: column; justify-content: center;">
          <h2 style="margin-bottom: 24px; font-size: 20px; color: #111111;">Congratulations you have now completed the Practice Round</h2>
          <p style="margin-bottom: 18px; font-size: 16px;">
            You have now completed all 6 practice trials and you may proceed to the main task.
          </p>
          <p style="font-size: 18px; color: #000000; margin-bottom: 6px;">
            <strong>Click the "Next" button below to continue.</strong>
          </p>
        </div>`,
      choices: "NO_KEYS",
      on_load: function() {
        sendPracticeDataToQualtrics(practiceAttempts);
      }
    };  

    // NEW STRUCTURAL CONDITIONAL BRANCH: Decides between your Success screen or your Skip screen
    var post_practice_branch = {
      timeline: [practice_success_screen],
      conditional_function: function() {
        var all_practice_responses = jsPsych.data.get().filter({test_part: 'practice_trial'}).values();
        var current_round_responses = all_practice_responses.slice(-6);
        var incorrect_count = current_round_responses.filter(function(trial) {
          return trial.correct === false;
        }).length;

        // If they failed and hit loop 6, execute the skip message screen instead
        if (incorrect_count >= 4 && practiceAttempts >= 6) {
          // CRITICAL ADDITION: Triggers data transfer, sends status: "fail" to Qualtrics
          sendPracticeDataToQualtrics(practiceAttempts);
          jsPsych.addNodeToEndOfTimeline(skip_experiment_screen);
          return false; // Skip the standard success screen block entirely
        }

        // CRITICAL ADDITION: Triggers data transfer, sends status: "pass" to Qualtrics
        // This catches everyone who passed early (attempts 1-5) AND those who passed on attempt 6!
        sendPracticeDataToQualtrics(practiceAttempts); 
        
        return true; // Show the normal success screen
      }
    };
     
    // Build the master structural sequence tree safely using the branch controller
    timeline.push(practice_loop_wrapper, post_practice_branch);

    // REUSABLE TRANSMISSION SYSTEM: Bundles arrays alongside your custom attempt counter
    function sendPracticeDataToQualtrics(totalRuns) {
        var allPracticeTrials = jsPsych.data.get().filter({test_part: 'practice_trial'}).values();
        var finalPassingTrials = allPracticeTrials.slice(-6); // Packages the exact final 6 trials processed

        var countsArray = [];
        var responsesArray = [];
        var rtsArray = [];
        var scoresArray = [];

        finalPassingTrials.forEach(function(trial) {
            countsArray.push(trial.squares_count);
            responsesArray.push(trial.participant_response || "timeout");
            rtsArray.push(trial.rt ? Math.round(trial.rt) : 2400); 
            scoresArray.push(trial.correct ? 1 : 0); 
        });

        // 1. Calculate the failure condition explicitly
        var incorrectCount = finalPassingTrials.filter(t => !t.correct).length;
        var hasFailedLockout = (totalRuns >= 6 && incorrectCount >= 4);

        var messagePayload = {
            source: 'jspsych-experiment',
            counts: countsArray.join(','),
            responses: responsesArray.join(','),
            rts: rtsArray.join(','),
            // Simplifies this string by using our clean variable
            scores: scoresArray.join(',') + (hasFailedLockout ? ',fail_lockout' : ''),
            attempts: totalRuns, // PUSHES ATTEMPT COUNT (1 to 6) DIRECTLY INTO PAYLOAD
        
            // 2. ADD THIS PROPERTY: Tells Qualtrics exactly when to flag a total lockout
            status: hasFailedLockout ? "fail" : "pass" 
        };

        console.log("Broadcasting Practice Payload to Parent Container:", messagePayload);
        window.parent.postMessage(messagePayload, "*"); 
    }

    // Run the experiment  
    jsPsych.run(timeline);
  </script>
</html>
